name: Release (Windows / MSVC)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Install Qt 6.11.1 (MSVC 2022 x64)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Package release ZIP
        shell: pwsh
        run: |
          $qtRoot = Split-Path -Parent (Split-Path -Parent $env:Qt6_DIR)
          .\scripts\package-release.ps1 -QtDir $qtRoot

      - name: Upload GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          files: out/build/Qt-MSVC2022-amd64-Ninja/TableEngine-*.zip
          fail_on_unmatched_files: true
